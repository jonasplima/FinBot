name: finbot

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    ports:
      - "8008:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - SERVER_URL=http://localhost:8008
      - WEBHOOK_GLOBAL_URL=http://finbot:3003/webhook/evolution
      - WEBHOOK_GLOBAL_BASE64=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1035712111
      - CONFIG_SESSION_PHONE_CLIENT=FinBot
      - DEL_INSTANCE=false
      - LOG_LEVEL=ERROR
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  finbot:
    build: .
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - LOG_LEVEL=${LOG_LEVEL}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OWNER_PHONE=${OWNER_PHONE}
      - ALLOWED_NUMBERS=${ALLOWED_NUMBERS}
      - ADMIN_SECRET=${ADMIN_SECRET}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  evolution_data:
